<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.O.E. DMO OPERATOR DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Space Grotesk', sans-serif; }
        .stat-card { border: 1px solid #333; background: #0a0a0a; padding: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-12">

    <!-- Header -->
    <header class="max-w-4xl mx-auto mb-10 border-b border-gray-800 pb-6">
        <h1 class="text-4xl font-black uppercase text-white tracking-tighter">M.O.E. DMO Tracker</h1>
        <p class="text-green-500 font-bold uppercase text-xs">Mathematics of Detachment: 10 Rejections = 1 Conversion</p>
    </header>

    <!-- Metrics Dashboard -->
    <main class="max-w-4xl mx-auto grid md:grid-cols-2 gap-6">
        
        <!-- Gate 1: Counter -->
        <section class="stat-card">
            <h2 class="text-sm font-bold uppercase mb-4 text-gray-500">Street Intercepts (KL City Centre)</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="updateDMO('rejects')" class="bg-red-900/20 border border-red-800 p-6 text-center hover:bg-red-900/40 transition">
                    <div id="count-rejects" class="text-4xl font-black text-red-500">0</div>
                    <div class="text-[10px] uppercase mt-1">Rejections</div>
                </button>
                <button onclick="updateDMO('conversions')" class="bg-green-900/20 border border-green-800 p-6 text-center hover:bg-green-900/40 transition">
                    <div id="count-conversions" class="text-4xl font-black text-green-500">0</div>
                    <div class="text-[10px] uppercase mt-1">Conversions</div>
                </button>
            </div>
        </section>

        <!-- Gate 2: Ratios -->
        <section class="stat-card flex flex-col justify-center">
            <h2 class="text-sm font-bold uppercase mb-4 text-gray-500">Conversion Velocity</h2>
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs">Current Ratio:</span>
                <span id="ratio-display" class="font-bold text-white">0:1</span>
            </div>
            <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
                <div id="ratio-bar" class="h-full bg-green-500 w-0 transition-all"></div>
            </div>
            <p class="text-[10px] text-gray-600 mt-4 uppercase">Target: Reach 10:1 to validate conversion pipeline.</p>
        </section>
    </main>

    <script>
        let dmo = JSON.parse(localStorage.getItem('moe_dmo')) || { rejects: 0, conversions: 0 };

        function updateDMO(type) {
            dmo[type]++;
            localStorage.setItem('moe_dmo', JSON.stringify(dmo));
            render();
        }

        function render() {
            document.getElementById('count-rejects').innerText = dmo.rejects;
            document.getElementById('count-conversions').innerText = dmo.conversions;
            
            const ratio = dmo.conversions > 0 ? (dmo.rejects / dmo.conversions).toFixed(1) : dmo.rejects;
            document.getElementById('ratio-display').innerText = `${ratio}:1`;
            
            const percentage = Math.min((dmo.conversions / 10) * 100, 100);
            document.getElementById('ratio-bar').style.width = percentage + '%';
        }

        render();
    </script>
</body>
</html>
